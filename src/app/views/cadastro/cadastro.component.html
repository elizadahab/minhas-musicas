<div class="cadastro-page">
  <div class="card">

    <div class="card-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
        <path d="M9 18V5l12-2v13"/>
        <circle cx="6" cy="18" r="3"/>
        <circle cx="18" cy="16" r="3"/>
      </svg>
      Cadastre-se
    </div>

    <form [formGroup]="form" (ngSubmit)="cadastrar()">

      <div class="field" [class.invalido]="form.get('nomeCompleto')?.invalid && form.get('nomeCompleto')?.touched">
        <input type="text" placeholder="Nome completo" formControlName="nomeCompleto"/>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <span class="hint" *ngIf="form.get('nomeCompleto')?.invalid && form.get('nomeCompleto')?.touched">
        Mínimo de 3 caracteres
      </span>

      <div class="field" [class.invalido]="form.get('usuario')?.invalid && form.get('usuario')?.touched">
        <input type="text" placeholder="Usuário" formControlName="usuario"/>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
        </svg>
      </div>
      <span class="hint" *ngIf="form.get('usuario')?.invalid && form.get('usuario')?.touched">
        Mínimo de 6 caracteres
      </span>

      <div class="field" [class.invalido]="form.get('email')?.invalid && form.get('email')?.touched">
        <input type="email" placeholder="Email" formControlName="email"/>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </div>
      <span class="hint" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
        Email inválido
      </span>

      <div class="field" [class.invalido]="form.get('senha')?.invalid && form.get('senha')?.touched">
        <input [type]="senhaVisivel ? 'text' : 'password'" placeholder="Senha" formControlName="senha"/>
        <svg (click)="toggleSenha()" style="cursor:pointer" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <span class="hint" *ngIf="form.get('senha')?.invalid && form.get('senha')?.touched">
        {{ getMensagemSenha() }}
      </span>

      <div class="field select-field" [class.invalido]="form.get('perfil')?.invalid && form.get('perfil')?.touched">
        <select formControlName="perfil">
          <option value="" disabled selected>Perfil</option>
          <option value="GRAVADORA">Gravadora</option>
          <option value="ARTISTA">Artista</option>
          <option value="USUARIO">Usuário</option>
        </select>
      </div>
      <span class="hint" *ngIf="form.get('perfil')?.invalid && form.get('perfil')?.touched">
        Selecione um perfil
      </span>

      <div class="erro" *ngIf="erro">{{ erro }}</div>

      <button type="submit" class="btn-cadastro" [disabled]="carregando">
        {{ carregando ? 'Cadastrando...' : 'Cadastrar' }}
      </button>

      <div class="footer-link">
        Já possui cadastro?
        <a routerLink="/login">Fazer login</a>
      </div>

    </form>
  </div>
</div>
